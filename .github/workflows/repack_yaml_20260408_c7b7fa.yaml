name: Repack to Combined Images

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master

jobs:
  repack:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore caches
        uses: actions/cache@v4
        with:
          path: |
            openwrt/dl
            openwrt/build_dir
            openwrt/staging_dir
            openwrt/.ccache
          key: build-${{ runner.os }}-${{ github.sha }}

      - name: Clone source (if not cached)
        run: |
          git clone $REPO_URL -b $REPO_BRANCH openwrt
          # 不需要 /workdir 软链接，已删除

      - name: Copy existing .config and modify
        run: |
          cp .config openwrt/.config
          cd openwrt
          # 启用 GRUB 镜像（生成 combined）
          sed -i 's/^# CONFIG_GRUB_IMAGES is not set/CONFIG_GRUB_IMAGES=y/' .config
          sed -i 's/^# CONFIG_GRUB_EFI_IMAGES is not set/CONFIG_GRUB_EFI_IMAGES=y/' .config
          sed -i 's/^# CONFIG_TARGET_IMAGES_GZIP is not set/CONFIG_TARGET_IMAGES_GZIP=y/' .config
          # 禁用 ext4 根文件系统（避免空间不足）
          sed -i 's/^CONFIG_TARGET_ROOTFS_EXT4FS=y/# CONFIG_TARGET_ROOTFS_EXT4FS is not set/' .config
          yes "" | make oldconfig

      - name: Incremental build (only images)
        run: |
          cd openwrt
          make target/install -j$(nproc)

      - name: Collect firmware
        run: |
          cd openwrt/bin/targets/x86/64
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: combined-firmware
          path: ${{ env.FIRMWARE }}/*-combined*.img*